env: prod

# For Databricks, use Unity Catalog table names or DBFS paths for Delta data.
# Example: nii_forecast.pipeline.actuals_enriched or dbfs:/mnt/nii_forecast/...

databricks:
  workspace_url: "https://dbc-2a897476-1b67.cloud.databricks.com"
  repo_path: "/Repos/nii_forecasting_pipeline"
  cluster_id: ""  # Optional: leave blank to use the default Databricks serverless warehouse or default job cluster

tables:
  source:
    actuals_balance: "/Volumes/nii_forecast/source/actuals_balance"
    actuals_income: "/Volumes/nii_forecast/source/actuals_income"
    forecast_inputs: "/Volumes/nii_forecast/source/forecast_inputs"
    market_assumptions: "/Volumes/nii_forecast/source/market_assumptions"
  hierarchy:
    business_unit_hierarchy: "/Volumes/nii_forecast/dim/business_unit_hierarchy"
    product_hierarchy: "/Volumes/nii_forecast/dim/product_hierarchy"
    financial_element_hierarchy: "/Volumes/nii_forecast/dim/financial_element_hierarchy"
    cost_centre_bridge: "/Volumes/nii_forecast/dim/cost_centre_bridge"
  config:
    parameter_store: "/Volumes/nii_forecast/config/parameter_store"
    active_config_versions: "/Volumes/nii_forecast/config/active_config_versions"
    parameter_catalog: "/Volumes/nii_forecast/config/parameter_catalog"
  intermediate:
    yield_parameters: "/Volumes/nii_forecast/staging/yield_parameters" # Verify schema existence
    balance_parameters: "/Volumes/nii_forecast/staging/balance_parameters" # Verify schema existence
    proxy_relationships: "/Volumes/nii_forecast/lookup/proxy_relationships"
    inflation_adjustments: "/Volumes/nii_forecast/lookup/inflation_adjustments"
    scaling_factors: "/Volumes/nii_forecast/lookup/scaling_factors"
    launchpoint_positions: "/Volumes/nii_forecast/enriched/launchpoint_positions"
    nii_drivers: "/Volumes/nii_forecast/enriched/nii_drivers"
  output:
    config_snapshot: "/Volumes/nii_forecast/staging/config_snapshot" # Verify schema existence
    actuals_enriched: "/Volumes/nii_forecast/staging/actuals_enriched" # Verify schema existence
    forecast_enriched: "/Volumes/nii_forecast/staging/forecast_enriched" # Verify schema existence
    launchpoint_enriched: "/Volumes/nii_forecast/staging/launchpoint_enriched" # Verify schema existence
    calculation_lookup: "/Volumes/nii_forecast/lookup/calculation_lookup"
    driver_parameters: "/Volumes/nii_forecast/lookup/driver_parameters"
    proxy_enriched: "/Volumes/nii_forecast/lookup/proxy_enriched"
    inflation_adjustment: "/Volumes/nii_forecast/lookup/inflation_adjustment"
    yield_delta: "/Volumes/nii_forecast/lookup/yield_delta"
    nii_stage: "/Volumes/nii_forecast/curated/nii_stage"
    nii_stage_cc: "/Volumes/nii_forecast/curated/nii_stage_cc"

output_format: "delta"

pipeline:
  run_id_prefix: "demo_run"
  day_count_basis: 360

default_task_input:
  system_params:
    job_name: "nii_forecast"
    run_date: "2026-06-05"
    environment: "prod"
  business_params:
    business_unit: "Retail"
    product: "Term Loan"
    currency: "USD"
  configuration_versions:
    CFG100: "v2026-06"
    CFG101: "v2026-06"
    CFG102: "v2026-06"
    CFG103: "v2026-06"
    CFG104: "v2026-06"
    CFG105: "v2026-06"
    CFG106: "v2026-06"
