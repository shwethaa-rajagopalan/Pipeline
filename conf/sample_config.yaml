env: prod

# For Databricks, use Unity Catalog table names or DBFS paths for Delta data.
# Example: nii_forecast.pipeline.actuals_enriched or dbfs:/mnt/nii_forecast/...

databricks:
  workspace_url: "https://dbc-2a897476-1b67.cloud.databricks.com"
  repo_path: "/Repos/nii_forecasting_pipeline"
  cluster_id: ""  # Optional: leave blank to use the default Databricks serverless warehouse or default job cluster

tables:
  source:
    actuals_balance: "nii_forecast.source.actuals_balance"
    actuals_income: "nii_forecast.source.actuals_income"
    forecast_inputs: "nii_forecast.source.forecast_inputs"
    market_assumptions: "nii_forecast.source.market_assumptions"
  hierarchy:
    business_unit_hierarchy: "nii_forecast.dim.business_unit_hierarchy"
    product_hierarchy: "nii_forecast.dim.product_hierarchy"
    financial_element_hierarchy: "nii_forecast.dim.financial_element_hierarchy"
    cost_centre_bridge: "nii_forecast.dim.cost_centre_bridge"
  config:
    parameter_store: "nii_forecast.config.parameter_store"
    active_config_versions: "nii_forecast.config.active_config_versions"
    parameter_catalog: "nii_forecast.config.parameter_catalog"
  intermediate:
    yield_parameters: "nii_forecast.pipeline.yield_parameters"
    balance_parameters: "nii_forecast.pipeline.balance_parameters"
    proxy_relationships: "nii_forecast.pipeline.proxy_relationships"
    inflation_adjustments: "nii_forecast.pipeline.inflation_adjustments"
    scaling_factors: "nii_forecast.pipeline.scaling_factors"
    launchpoint_positions: "nii_forecast.pipeline.launchpoint_positions"
    nii_drivers: "nii_forecast.pipeline.nii_drivers"
  output:
    config_snapshot: "nii_forecast.pipeline.config_snapshot"
    actuals_enriched: "nii_forecast.pipeline.actuals_enriched"
    forecast_enriched: "nii_forecast.pipeline.forecast_enriched"
    launchpoint_enriched: "nii_forecast.pipeline.launchpoint_enriched"
    calculation_lookup: "nii_forecast.pipeline.calculation_lookup"
    driver_parameters: "nii_forecast.pipeline.driver_parameters"
    proxy_enriched: "nii_forecast.pipeline.proxy_enriched"
    inflation_adjustment: "nii_forecast.pipeline.inflation_adjustment"
    yield_delta: "nii_forecast.pipeline.yield_delta"
    nii_stage: "nii_forecast.curated.nii_stage"
    nii_stage_cc: "nii_forecast.curated.nii_stage_cc"

output_format: "delta"

pipeline:
  run_id_prefix: "demo_run"
  day_count_basis: 360

default_task_input:
  system_params:
    job_name: "nii_forecast"
    run_date: "2026-06-05"
    environment: "prod"
  business_params:
    business_unit: "Retail"
    product: "Term Loan"
    currency: "USD"
  configuration_versions:
    CFG100: "v2026-06"
    CFG101: "v2026-06"
    CFG102: "v2026-06"
    CFG103: "v2026-06"
    CFG104: "v2026-06"
    CFG105: "v2026-06"
    CFG106: "v2026-06"
    CFG107: "v2026-06"
    CFG108: "v2026-06"
    CFG109: "v2026-06"
    CFG110: "v2026-06"
    CFG111: "v2026-06"
    CFG112: "v2026-06"
    CFG113: "v2026-06"
